name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  titan-ci:
    name: Titan CI (Rust)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        run: rustup update stable

      - name: Run Titan cargo test
        run: cargo test
        working-directory: Titan

  python-ci:
    name: Python CI (Ritam)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f ritam/requirements.txt ]; then pip install -r ritam/requirements.txt; fi
          pip install pytest

      - name: Run Ritam pytest
        run: pytest ritam/tests/ -v
